{% extends "base.html" %}
{% from "macros.html" import sidebar, topbar, flash_messages %}
{% block title %}Add User – IMS Admin{% endblock %}
{% block body %}
<div class="app-layout">
  {{ sidebar('admin', 'users') }}
  <div class="main-content">
    {{ topbar('Add New User') }}
    <div class="content-area">
      {{ flash_messages() }}
      <div class="card" style="max-width:560px">
        <div class="card-header"><h3>New User Details</h3></div>
        <div class="card-body">
          <form method="POST" action="/admin/users/add" class="form-vertical">
            <div class="form-group"><label>Full Name</label><input type="text" name="name" required/></div>
            <div class="form-group"><label>Email</label><input type="email" name="email" required/></div>
            <div class="form-group"><label>Phone</label><input type="tel" name="phone"/></div>
            <div class="form-group"><label>Role</label>
              <select name="role" required>
                <option value="admin">Admin</option>
                <option value="mentor">Mentor</option>
                <option value="trainee" selected>Trainee</option>
              </select>
            </div>
            <div class="form-group"><label>Password</label><input type="password" name="password" required minlength="6"/></div>
            <div class="form-actions">
              <button type="submit" class="btn-primary">Add User</button>
              <a href="/admin/users" class="btn-outline">Cancel</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
