{% extends "base.html" %}
{% from "macros.html" import sidebar, topbar, flash_messages %}
{% block title %}Settings – IMS Trainee{% endblock %}
{% block body %}
<div class="app-layout">
  {{ sidebar('trainee', 'settings') }}
  <div class="main-content">
    {{ topbar('Settings') }}
    <div class="content-area">
      {{ flash_messages() }}
      
<div class="card" style="max-width:480px"><div class="card-header"><h3>Account Settings</h3></div><div class="card-body">
<form method="POST" action="/trainee/settings" class="form-vertical">
<div class="form-group"><label>Name</label><input type="text" name="name" value="{{ user.name }}" required/></div>
<div class="form-group"><label>Email</label><input type="email" value="{{ user.email }}" disabled/></div>
<div class="form-group"><label>Phone</label><input type="tel" name="phone" value="{{ user.phone or '' }}"/></div>
<div class="form-actions"><button type="submit" class="btn-primary">Save Changes</button></div>
</form></div></div>
    </div>
  </div>
</div>
{% endblock %}
